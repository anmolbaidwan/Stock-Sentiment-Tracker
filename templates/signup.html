<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - CSCI331</title>
<style>
:root {
    --bg: #0a0a0a;
    --bg-alt: #111;
    --text: #e5e5e5;
    --accent: #0f0;
    --border: #222;
    --input-border: #333;
}
body.light-mode {
    --bg: #d3d3d3;
    --bg-alt: #bebebe;
    --text: #000080;
    --accent: #000080;
    --border: #999;
    --input-border: #888;
}
body {
    margin: 0;
    font-family: monospace;
    background: var(--bg);
    color: var(--text);
    font-size: large;
    transition: background 0.3s, color 0.3s;
}
.login {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    border: 1px solid var(--border);
}
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid var(--border);
}
input {
    padding: 10px;
    background: var(--bg-alt);
    border: 1px solid var(--input-border);
    color: var(--text);
}
button {
    padding: 8px;
    background: var(--bg-alt);
    color: var(--accent);
    border: 1px solid var(--accent);
    cursor: pointer;
}
a {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
}
/* TOGGLE SWITCH */
.theme-switch-wrapper { position: fixed; bottom: 20px; right: 20px; display: flex; align-items: center; }
.switch { display: inline-block; height: 24px; position: relative; width: 50px; }
.switch input { display:none; }
.slider { background-color: #333; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border: 1px solid var(--accent); border-radius: 34px; }
.slider:before { background-color: var(--accent); bottom: 3px; content: ""; height: 16px; left: 4px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
input:checked + .slider { background-color: #fff; }
input:checked + .slider:before { transform: translateX(24px); }
</style>
</head>

<body>
<div class="nav">
    <div><a href = '/'>Quetan Inc</a></div>
</div>

<div class="login">
<form class="box" method="POST">
    <div>> sign up</div>
    <input name="email" placeholder="email" required>
    <input name="username" placeholder="username" required>
    <input type="password" name="password" placeholder="password" required>
    <button type="submit">Create</button>
    <a href="/login">← back to login</a>
</form>
</div>

<div class="theme-switch-wrapper">
    <label class="switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider"></div>
    </label>
</div>

<script>
const toggleSwitch = document.querySelector('#checkbox');
const currentTheme = localStorage.getItem('theme');
if (currentTheme) {
    document.body.classList.add(currentTheme);
    if (currentTheme === 'light-mode') toggleSwitch.checked = true;
}
toggleSwitch.addEventListener('change', (e) => {
    if (e.target.checked) {
        document.body.classList.add('light-mode');
        localStorage.setItem('theme', 'light-mode');
    } else {
        document.body.classList.remove('light-mode');
        localStorage.setItem('theme', 'dark-mode');
    }
});
</script>
</body>
</html>
