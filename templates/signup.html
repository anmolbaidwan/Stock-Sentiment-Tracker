<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - CSCI331</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #0a0a0a;
    color: #e5e5e5;
    font-size: large;
}
.login {
    margin: 0;
    font-family: monospace;
    background: #0a0a0a;
    color: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    border: 1px solid #222;
}
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #222;
}

input {
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    color: white;
}

button {
    padding: 8px;
    background: #111;
    color: #0f0;
    border: 1px solid #0f0;
    cursor: pointer;
}

a {
    color: #0f0;
    text-decoration: none;
    font-size: 12px;
}

</style>
</head>

<body>
<div class="nav">
    <div><a href = '/'>Quetan Inc</a></div>
</div>

<div class="login">
<form class="box" method="POST">
    <div>> sign up</div>

    <input name="username" placeholder="username" required>
    <input type="password" placeholder="password">

    <button type="submit">Create</button>

    <a href="/login">← back to login</a>
</form>
</div>
</body>
</html>
