<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - CSCI331</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #0a0a0a;
    color: #e5e5e5;
    font-size: large;
}
.login {
    margin: 0;
    font-family: monospace;
    background: #0a0a0a;
    color: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #222;
}


.box {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    border: 1px solid #222;
    
}

input {
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    color: white;
}

button {
    padding: 8px;
    background: #111;
    color: #0f0;
    border: 1px solid #0f0;
    cursor: pointer;
}

a {
    color: #0f0;
    text-decoration: none;
    font-size: 12px;
}
</style>
</head>



<body>
<div class="nav">
    <div><a href = '/'>Quetan Inc</a></div>
</div>

<div class="login">
<form class="box" method="POST">
    <div>> login</div>

    <input name="username" placeholder="username" required>
    <input type="password" name="password" placeholder="password" required>
    {% if dne %}
    <p>Account Does Not Exist</p>
    {% endif %}
    {% if wrong %}
    <p>Wrong Password</p>
    {% endif %}
    <button type="submit">Login</button>
    <a href="/signup">create account →</a>
</form>
</div>

</body>
</html>
